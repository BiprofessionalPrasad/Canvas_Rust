<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Drawing Tool</title>
    <style>
        body {
            background-color: #1e1e1e; /* Dark background like Figma */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        #error-container {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #ff4444;
            color: white;
            padding: 15px;
            border-radius: 5px;
            z-index: 1000;
            display: none;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        #error-container button {
            background: white;
            color: #ff4444;
            border: none;
            padding: 5px 10px;
            margin-top: 10px;
            border-radius: 3px;
            cursor: pointer;
        }

        canvas {
            background-color: #2c2c2c; /* Canvas background */
            border: 1px solid #444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: crosshair;
        }

        #status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #333;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            font-family: monospace;
            display: flex;
            align-items: center;
            height: 32px;
            box-sizing: border-box;
        }

        #status-bar.error {
            background: #ff4444;
        }

        #status-bar.success {
            background: #4CAF50;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        canvas:focus {
            outline: 3px solid #4a90e2;
            outline-offset: 2px;
        }

        .swatch {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 3px;
            cursor: pointer;
            border: 2px solid #555;
            transition: transform 0.1s, border-color 0.1s;
            vertical-align: middle;
        }

        .swatch:hover {
            transform: scale(1.2);
            border-color: #fff;
        }

        .swatch.active {
            border-color: #4a90e2;
            box-shadow: 0 0 4px #4a90e2;
        }
    </style>
</head>
<body>

    <main role="application" aria-label="Drawing Canvas">
        <section id="controls" aria-label="Drawing Controls" style="margin-bottom: 20px; color: white; background: #333; padding: 10px; border-radius: 5px;">
            <div style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap;">
                <div>
                    <label for="colorPicker">Color:</label>
                    <input type="color" id="colorPicker" value="#E0E0E0" aria-describedby="color-desc">
                    <span id="color-desc" class="sr-only">Select drawing color</span>
                </div>
                <div>
                    <label for="textInput">Text:</label>
                    <input type="text" id="textInput" value="" maxlength="1000" style="width: 100px;" aria-describedby="text-desc">
                    <span id="text-desc" class="sr-only">Enter text for text tool</span>
                </div>
                <div>
                    <label for="fontSizeInput">Font Size:</label>
                    <input type="number" id="fontSizeInput" value="20" min="6" max="72" style="width: 70px;" aria-describedby="font-desc">
                    <span id="font-desc" class="sr-only">Font size in pixels (6-72)</span>
                </div>
                <div>
                    <label for="outlineCheck">Outline:</label>
                    <input type="checkbox" id="outlineCheck" aria-describedby="outline-desc">
                    <span id="outline-desc" class="sr-only">Draw shapes as outlines only (no fill)</span>
                </div>
                <div style="display: flex; gap: 4px; align-items: center;">
                    <span style="margin-right: 4px;">Palette:</span>
                    <span id="palette"></span>
                    <button id="addToPalette" title="Add current color to palette" style="background: #555; color: #fff; border: none; border-radius: 3px; cursor: pointer; padding: 2px 8px; font-size: 14px;">+</button>
                </div>
                <div>
                    <button id="saveBtn" title="Save canvas as PNG" style="background: #4CAF50; color: white; border: none; border-radius: 3px; cursor: pointer; padding: 4px 12px;">Save PNG</button>
                </div>
                <div style="margin-left: 20px;">
                    <span style="margin-right: 10px;">Canvas: </span>
                    <label for="canvasWidth">Width:</label>
                    <input type="number" id="canvasWidth" value="800" min="100" max="10000" style="width: 80px;" aria-describedby="width-desc">
                    <span id="width-desc" class="sr-only">Canvas width in pixels (100-10000)</span>
                    <label for="canvasHeight" style="margin-left: 10px;">Height:</label>
                    <input type="number" id="canvasHeight" value="600" min="100" max="10000" style="width: 80px;" aria-describedby="height-desc">
                    <span id="height-desc" class="sr-only">Canvas height in pixels (100-10000)</span>
                </div>
            </div>
        </section>

        <canvas id="canvas" width="800" height="600" tabindex="0"
                role="img" aria-label="Drawing canvas. Use arrow keys to navigate shapes, Delete to remove selected shape.">
        </canvas>
    </main>

    <div id="error-container" role="alert" aria-live="assertive">
        <div id="error-message"></div>
        <button onclick="this.parentElement.style.display='none'">Dismiss</button>
    </div>

    <div id="status-bar" role="status" aria-live="polite" aria-atomic="true">Ready</div>

    <!-- Screen reader announcements (hidden) -->
    <div id="sr-announcements" aria-live="polite" aria-atomic="true" class="sr-only"></div>

    <script type="module">
        import init, {
            set_selected_color,
            set_selected_font_size,
            set_selected_text,
            resize_canvas,
            set_outline_mode,
            get_outline_mode,
            get_selected_color,
            get_selected_text,
            get_selected_font_size
        } from './pkg/rust_canvas_app.js';

        function showError(message) {
            const errorContainer = document.getElementById('error-container');
            const errorMessage = document.getElementById('error-message');
            errorMessage.textContent = message;
            errorContainer.style.display = 'block';

            // Also show in status bar
            const statusBar = document.getElementById('status-bar');
            statusBar.textContent = message;
            statusBar.className = 'error';

            console.error(message);
        }

        function updateStatus(message, type = 'normal') {
            const statusBar = document.getElementById('status-bar');
            statusBar.textContent = message;
            statusBar.className = type;
        }

        function clearStatus() {
            const statusBar = document.getElementById('status-bar');
            statusBar.textContent = 'Ready';
            statusBar.className = '';
        }

        async function run() {
            try {
                await init();
                updateStatus("Application loaded successfully", "success");
                clearStatus();
            } catch (error) {
                showError("Failed to load the application. Please refresh the page or try a different browser.");
                console.error("WASM initialization failed:", error);
                return;
            }

            // Expose WASM API for programmatic access (testing / debugging)
            window.__canvasApp = {
                set_selected_color,
                set_selected_font_size,
                set_selected_text,
                resize_canvas,
                set_outline_mode,
                get_outline_mode,
                get_selected_color,
                get_selected_text,
                get_selected_font_size,
            };

            const colorPicker = document.getElementById('colorPicker');
            const textInput = document.getElementById('textInput');
            const fontSizeInput = document.getElementById('fontSizeInput');
            const outlineCheck = document.getElementById('outlineCheck');
            const paletteEl = document.getElementById('palette');
            const addToPaletteBtn = document.getElementById('addToPalette');
            const saveBtn = document.getElementById('saveBtn');
            const canvasWidth = document.getElementById('canvasWidth');
            const canvasHeight = document.getElementById('canvasHeight');
            const canvas = document.getElementById('canvas');

            // Color validation - use 'change' event for single-click selection
            colorPicker.addEventListener('change', (e) => {
                try {
                    set_selected_color(e.target.value);
                    updateStatus(`Color changed to ${e.target.value}`, "success");
                } catch (error) {
                    showError(`Invalid color: ${error}`);
                    e.target.value = "#E0E0E0"; // Reset to default
                }
            });

            // Text validation
            let textTimeout;
            textInput.addEventListener('input', (e) => {
                clearTimeout(textTimeout);
                textTimeout = setTimeout(() => {
                    try {
                        set_selected_text(e.target.value);
                        if (e.target.value) {
                            updateStatus(`Text updated: ${e.target.value.substring(0, 20)}${e.target.value.length > 20 ? '...' : ''}`, "success");
                        }
                    } catch (error) {
                        showError(`Invalid text: ${error}`);
                    }
                }, 300); // Debounce text input
            });

            // Handle backspace/delete key to prevent errors
            textInput.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' || e.key === 'Delete') {
                    // Allow backspace/delete to work normally
                    setTimeout(() => {
                        try {
                            set_selected_text(textInput.value);
                        } catch (error) {
                            // Silently ignore errors for empty text
                            console.warn('Text input error ignored:', error);
                        }
                    }, 0);
                }
            });

            // Font size validation
            fontSizeInput.addEventListener('input', (e) => {
                const size = parseFloat(e.target.value);
                if (!isNaN(size) && size >= 6 && size <= 72) {
                    try {
                        set_selected_font_size(size);
                        updateStatus(`Font size changed to ${size}px`, "success");
                    } catch (error) {
                        showError(`Invalid font size: ${error}`);
                        e.target.value = 20; // Reset to default
                    }
                } else {
                    if (!isNaN(size)) {
                        e.target.value = 20; // Reset to default if out of range
                    }
                }
            });

            // Outline mode toggle
            outlineCheck.addEventListener('change', (e) => {
                try {
                    set_outline_mode(e.target.checked);
                    const mode = e.target.checked ? 'outline' : 'filled';
                    updateStatus(`Shape mode set to ${mode}`, 'success');
                } catch (error) {
                    showError(`Failed to set outline mode: ${error}`);
                }
            });

            // Color palette with localStorage persistence
            const STORAGE_KEY = 'canvas_rust_palette';
            const DEFAULT_PALETTE = [
                '#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF', '#00FFFF',
                '#FF6600', '#FF0066', '#66FF00', '#0066FF', '#6600FF', '#FFCC00',
                '#FFFFFF', '#CCCCCC', '#888888', '#444444', '#000000',
            ];

            function loadPalette() {
                try {
                    const stored = localStorage.getItem(STORAGE_KEY);
                    if (stored) return JSON.parse(stored);
                } catch (_) {}
                return DEFAULT_PALETTE;
            }

            function savePalette(colors) {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(colors));
                } catch (_) {}
            }

            function renderPalette() {
                const colors = loadPalette();
                paletteEl.innerHTML = colors.map(c =>
                    `<span class="swatch" style="background:${c};" data-color="${c}" role="button" tabindex="0" aria-label="Color ${c}"></span>`
                ).join('');

                paletteEl.querySelectorAll('.swatch').forEach(el => {
                    el.addEventListener('click', () => {
                        set_selected_color(el.dataset.color);
                        syncControls();
                    });
                    el.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            set_selected_color(el.dataset.color);
                            syncControls();
                        }
                    });
                });
            }

            addToPaletteBtn.addEventListener('click', () => {
                const current = get_selected_color();
                const colors = loadPalette();
                if (!colors.includes(current)) {
                    colors.push(current);
                    savePalette(colors);
                    renderPalette();
                    updateStatus(`Added ${current} to palette`, 'success');
                } else {
                    updateStatus(`${current} already in palette`, 'normal');
                }
            });

            renderPalette();

            // Save canvas as PNG
            saveBtn.addEventListener('click', () => {
                try {
                    const dataUrl = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = `canvas-${Date.now()}.png`;
                    link.href = dataUrl;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    updateStatus('Canvas saved as PNG', 'success');
                } catch (error) {
                    showError(`Failed to save: ${error}`);
                }
            });

            // Canvas dimension validation
            const updateCanvasSize = () => {
                const width = parseFloat(canvasWidth.value);
                const height = parseFloat(canvasHeight.value);

                if (!isNaN(width) && !isNaN(height) && width >= 100 && height >= 100 && width <= 10000 && height <= 10000) {
                    try {
                        resize_canvas(width, height);
                        updateStatus(`Canvas resized to ${width}x${height}`, "success");
                    } catch (error) {
                        showError(`Invalid canvas dimensions: ${error}`);
                        canvasWidth.value = 800;
                        canvasHeight.value = 600; // Reset to defaults
                    }
                }
            };

            canvasWidth.addEventListener('change', updateCanvasSize);
            canvasHeight.addEventListener('change', updateCanvasSize);

            // Periodically sync UI controls with selected shape
            const syncControls = () => {
                try {
                    colorPicker.value = get_selected_color();
                    textInput.value = get_selected_text();
                    fontSizeInput.value = get_selected_font_size();
                    outlineCheck.checked = get_outline_mode();
                } catch (error) {
                    console.warn("Failed to sync controls:", error);
                }
            };

            canvas.addEventListener('mousedown', () => {
                // Wait a bit for Rust to update state
                setTimeout(syncControls, 10);
            });

            // Initial sync
            syncControls();
        }

        // Handle unhandled promise rejections
        window.addEventListener('unhandledrejection', (event) => {
            showError(`Unhandled error: ${event.reason}`);
            event.preventDefault();
        });

        // Run the application
        run();
    </script>
</body>
</html>
